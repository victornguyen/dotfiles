pre-commit:
  parallel: true
  commands:
    shellcheck:
      glob: "*.sh"
      run: shellcheck {staged_files}
    shell-scripts:
      glob: "scripts/*"
      exclude: "scripts/lib/*"
      run: shellcheck {staged_files}
    stylua-check:
      glob: "*.lua"
      run: stylua --check {staged_files}
