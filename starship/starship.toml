# Starship config: Pure-inspired minimal prompt
# Docs: https://starship.rs/config/

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

# Pure uses a newline before the prompt character
add_newline = true

[directory]
style = "blue"
truncation_length = 3
truncate_to_repo = true

[git_branch]
style = "gray"
format = "[$branch]($style) "

[git_status]
style = "red"
format = '([$all_status$ahead_behind]($style) )'

[cmd_duration]
style = "yellow"
min_time = 5_000
format = "[$duration]($style) "

[character]
# Pure uses a magenta arrow that turns red on error
success_symbol = "[>](purple)"
error_symbol = "[>](red)"
vimcmd_symbol = "[<](green)"
