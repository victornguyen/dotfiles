# Prefix <ctrl>+q
unbind C-b
set -g prefix C-q
bind C-q send-prefix

# Use login shell
set -g default-shell $SHELL

# Enable macOS clipboard integration
set-option -g set-clipboard on

# Enable true colour in tmux
# https://news.ycombinator.com/item?id=37811248
set -g default-terminal tmux-256color
set-option -sa terminal-overrides ',xterm-kitty:RGB'
set-option -ga terminal-overrides ",xterm*:Tc:smcup@:rmcup@"
set-option -ga terminal-overrides ",screen*:Tc:smcup@:rmcup@"
set-option -ga terminal-overrides ",tmux*:Tc:smcup@:rmcup@"

# Reload tmux.conf
unbind r
bind r source-file ~/.tmux.conf\; display-message "~/.tmux.conf is reloaded"

# Fuzzy find sessions in popup
bind s display-popup -w 30% -h 40% -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | FZF_DEFAULT_OPTS='--reverse --cycle --jump-labels=1234567890abcdefghijklmnopqrstuvwxyz --bind=tab:jump,jump:accept' fzf | xargs tmux switch-client -t"

# Quick popup terminal for one-off commands
bind t display-popup -E -w 80% -h 60%

# Move left/right between windows with <alt-<>>
bind -n M-, select-window -p
bind -n M-. select-window -n

# Switch between previous and current window
unbind C-w
bind C-w last-window

# Swap window position with <ctrl>+<shift>+<left/right>
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# Easy to remember split pane commands
bind \\ split-window -h
bind - split-window -v

# Resize panes with vim movement keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Set default path for session (prefix + D)
bind D command-prompt -I "#{pane_current_path}" -p "Set default path:" "attach -t . -c '%%'"

# Set window/pane indexes to start at 1
setw -g pane-base-index 1
set -g base-index 1

# Re-number windows when window is closed
set -g renumber-windows on

# Disable auto-renaming of windows?
set-option -g allow-rename off

# Enable focus events for autoread in neovim
set-option -g focus-events on

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Increase scrollback buffer size
set -g history-limit 50000

# Fix Esc delay in vim (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Rebind begin selection to a vim key in copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection

#######################
### PANE NAVIGATION ###
#######################

# Go to next pane
unbind ^q
bind ^q select-pane -t :.+

#############
### THEME ###
#############

set-option -g status-position top

# Kanagawa Dragon theme
# bg=#181616 bg_dark=#0d0c0c bg_surface=#282727
# fg=#c5c9c5 fg_dim=#a6a69c ash=#737c73
# blue=#658594 green=#87a987 red=#c4746e yellow=#c4b28a

# Status bar
set -g status-style "bg=#0d0c0c,fg=#c5c9c5"
set -g status-left-length 100
set -g status-right-length 100

# Status left: session name
set -g status-left "#[bg=#658594,fg=#0d0c0c,bold] #S #[bg=#0d0c0c,fg=#658594]"

# Window status
set -g window-status-format "#[fg=#737c73,bg=#0d0c0c] #[fg=#a6a69c]#I #W "
set -g window-status-current-format "#[fg=#0d0c0c,bg=#282727]#[fg=#c5c9c5,bg=#282727] #I #W #[fg=#282727,bg=#0d0c0c]"
set -g window-status-separator ""

# Status right
set -g status-right "#[fg=#282727]#[fg=#a6a69c,bg=#282727] #(whoami) #[fg=#658594,bg=#282727]#[fg=#0d0c0c,bg=#658594,bold] %H:%M "

# Pane border
set -g pane-border-style "fg=#282727"
set -g pane-active-border-style "fg=#658594"

# Message styling
set -g message-style "bg=#282727,fg=#c4b28a"
set -g message-command-style "bg=#282727,fg=#c4b28a"

# Selection / copy mode
set -g mode-style "bg=#658594,fg=#0d0c0c"

# Popup styling
set -g popup-border-style "fg=#393836"
set -g popup-style "bg=#181616"

###############
### PLUGINS ###
###############
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

set -g @plugin 'tmux-plugins/tmux-battery'
set -g @batt_remain_short true

set -g @plugin 'tmux-plugins/tmux-open'
set -g @open-S 'https://www.google.com.au/search?q='

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'

# Install tpm if not already installed
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize Tmux plugin manager
# (Needs to be at the bottom of tmux.conf)
# <prefix>-I to install plugins
# <prefix>-U to update plugins
# <prefix>-<alt>+u to remove plugins not in conf
run -b '~/.tmux/plugins/tpm/tpm'
